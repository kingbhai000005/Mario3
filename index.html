<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mario Pro Ultimate - Balanced Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="mainBody">

<div id="startMenu">
    <h1 style="margin:0; color:#ff4444; font-size: 35px;">ULTIMATE MARIO</h1>
    <p>Hi-Score: <span id="hiScoreDisp">0</span></p>

    <div id="rgbToggle" onclick="toggleRGB()">RGB MODE: OFF</div>
    
    <button class="test-btn" id="testModeBtn" onclick="toggleTestMode()">TEST MODE: OFF</button>

    <div class="hero-preview" id="currentHeroPreview"></div>
    <button class="change-btn" id="changeHeroBtn">Change Character</button>

    <div class="section-title">Themes</div>
    <div class="grid-list" id="themeList"></div>

    <button class="start-btn" onclick="initGame()">START ADVENTURE</button>

    <button class="details-btn" id="toggleEnemyInfoBtn">Show Enemy Details</button>
    <div id="enemyInfoBox" class="enemy-info-container"></div>

    <div id="heroSelectionOverlay" class="hero-selection-overlay hidden">
        <div class="hero-selection-content">
            <h2>Select Hero</h2>
            <div id="heroSelectionGrid" class="grid-list"></div>
            <button class="close-btn" id="closeHeroSelectionBtn">Close</button>
        </div>
    </div>
</div>

<div id="rotateNotice">Please rotate your device to landscape for best gameplay.</div>
<div id="gameContainer">
    <div id="ui">SCORE: <span id="scoreVal">0</span> | <span id="curWep">None</span></div>
    <div id="menu">
        <h1 style="color:#ff4444; font-size: 40px; margin:0;">WASTED</h1>
        <p id="finalScore">SCORE: 0</p>
        <button class="start-btn" onclick="returnToMainMenu()">MAIN MENU</button>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
        <div id="leftBtn" class="btn">◀</div>
        <div id="rightBtn" class="btn">▶</div>
    </div>
    <div id="jumpBtn" class="jump-btn">JUMP</div>
    <div id="attackBtn" class="attack-btn">ATTACK</div>
</div>

<script src="game.js"></script>
</body>
</html>
